<body>

<header>
<h1>IT用語クイズ300問</h1>
<p>50問ランダム出題！同じ問題が連続しない改良版！</p>

問題数：

<script>

// ===== ベース問題 =====
const baseQuestions = [

{
type:"基本",
question:"CPUとは何の役割をする部品？",
answer:"計算や処理を行う",
choices:["画面を映す","計算や処理を行う","音を出す","電源を入れる"]
},

{
type:"基本",
question:"OSとは？",
answer:"コンピューターを動かす基本ソフト",
choices:["画像ソフト","コンピューターを動かす基本ソフト","広告","部品"]
},

{
type:"Web",
question:"HTMLの主な役割は？",
answer:"Webページの構造を作る",
choices:["デザインする","Webページの構造を作る","通信する","保存する"]
},

{
type:"Web",
question:"CSSの主な役割は？",
answer:"見た目を整える",
choices:["文章を書く","見た目を整える","サーバーを作る","削除する"]
},

{
type:"AI",
question:"AIとは？",
answer:"人工知能",
choices:["人工知能","画像保存","通信速度","電源装置"]
},

{
type:"AI",
question:"生成AIとは？",
answer:"文章や画像などを作るAI",
choices:["電気を作るAI","文章や画像などを作るAI","掃除機","検索だけ"]
},

{
type:"セキュリティ",
question:"フィッシング詐欺とは？",
answer:"偽サイトなどで情報を盗む詐欺",
choices:["釣りゲーム","偽サイトなどで情報を盗む詐欺","画像加工","通信速度"]
},

{
type:"開発",
question:"GitHubとは？",
answer:"コードを保存・共有できるサービス",
choices:["動画サイト","コードを保存・共有できるサービス","ブラウザ","OS"]
},

{
type:"データ",
question:"APIとは？",
answer:"ソフト同士をつなぐ窓口",
choices:["広告","ソフト同士をつなぐ窓口","画面","電池"]
},

{
type:"サイト運営",
question:"SEOとは？",
answer:"検索で見つかりやすくする対策",
choices:["画像編集","検索で見つかりやすくする対策","電源管理","文字入力"]
}

];

// ===== 300問生成 =====
const quizData = [];

for(let i=1;i<=30;i++){

baseQuestions.forEach(q=>{

quizData.push({
question:`【${i}｜${q.type}】${q.question}`,
answer:q.answer,
choices:[...q.choices],
type:q.type
});

});

}

// ===== 安全シャッフル =====
function shuffle(array){

const arr=[...array];

for(let i=arr.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[arr[i],arr[j]]=[arr[j],arr[i]];

}

return arr;

}

// ===== 同じ問題が連続しない =====
function balancedPick(count){

const grouped = {};

quizData.forEach(q => {

if(!grouped[q.type]) grouped[q.type] = [];

grouped[q.type].push(q);

});

Object.keys(grouped).forEach(type => {

grouped[type] = shuffle(grouped[type]);

});

const selected = [];

let lastQuestionText = "";

let types = shuffle(Object.keys(grouped));

while(selected.length < count){

let added = false;

for(const type of types){

if(!grouped[type].length) continue;

const index = grouped[type].findIndex(q => {

const cleanText =
q.question.replace(/^【.*?】/, "");

return cleanText !== lastQuestionText;

});

if(index !== -1 && selected.length < count){

const q =
grouped[type].splice(index, 1)[0];

selected.push(q);

lastQuestionText =
q.question.replace(/^【.*?】/, "");

added = true;

}

}

if(!added) break;

types = shuffle(types);

}

return shuffle(selected);

}

let quizzes=[];
let currentQuiz=0;
let score=0;
let answered=false;

const startBtn=document.getElementById("startBtn");
const quizArea=document.getElementById("quizArea");
const questionEl=document.getElementById("question");
const choicesEl=document.getElementById("choices");
const resultEl=document.getElementById("result");
const nextBtn=document.getElementById("nextBtn");
const restartBtn=document.getElementById("restartBtn");
const statusEl=document.getElementById("status");

startBtn.onclick=()=>{

const count=
Number(document.getElementById("questionCount").value);

quizzes=
balancedPick(count);

currentQuiz=0;
score=0;

startBtn.style.display="none";

quizArea.style.display="block";

loadQuiz();

};

function loadQuiz(){

answered=false;

resultEl.textContent="";

nextBtn.style.display="none";

choicesEl.innerHTML="";

const quiz=quizzes[currentQuiz];

statusEl.textContent=
`第${currentQuiz+1}問 / ${quizzes.length}問 ｜ 正解 ${score}`;

questionEl.textContent=
quiz.question;

const shuffledChoices=
shuffle(quiz.choices);

shuffledChoices.forEach(choice=>{

const btn=
document.createElement("button");

btn.textContent=choice;

btn.className="choice-btn";

btn.onclick=()=>checkAnswer(btn,choice);

choicesEl.appendChild(btn);

});

}

function checkAnswer(button,selected){

if(answered)return;

answered=true;

const correctAnswer=
quizzes[currentQuiz].answer;

const buttons=
choicesEl.querySelectorAll("button");

buttons.forEach(btn=>{

if(btn.textContent===correctAnswer){

btn.classList.add("correct");

}

});

if(selected===correctAnswer){

score++;

button.classList.add("correct");

resultEl.textContent="正解！";

}else{

button.classList.add("wrong");

resultEl.textContent=
`不正解！ 正解は「${correctAnswer}」`;

}

nextBtn.style.display="block";

}

nextBtn.onclick=()=>{

currentQuiz++;

if(currentQuiz<quizzes.length){

loadQuiz();

}else{

showFinal();

}

};

restartBtn.onclick=()=>{

location.reload();

};

function showFinal(){

const percent=
Math.round((score/quizzes.length)*100);

let rank="";

if(percent>=90){

rank="Sランク：IT用語マスター！";

}else if(percent>=70){

rank="Aランク：かなり理解しています！";

}else if(percent>=50){

rank="Bランク：基本はOK！";

}else{

rank="Cランク：もう一度挑戦！";

}

questionEl.innerHTML=`
<div class="final">
クイズ終了！<br>
${quizzes.length}問中 ${score}問正解！<br>
正答率：${percent}%<br><br>
${rank}
</div>
`;

choicesEl.innerHTML="";
resultEl.textContent="";
nextBtn.style.display="none";
restartBtn.style.display="block";
statusEl.textContent="終了";

}

</script>

</body>
